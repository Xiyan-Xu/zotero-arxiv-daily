zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}          # 你可以继续用此变量，或改为 GEMINI_API_KEY
    base_url: ${oc.env:OPENAI_API_BASE}    # 若使用 Gemini 直连，可改成对应 endpoint
  generation_kwargs:
    model: gemini-1.1                       # 推荐：gemini-1.1，或 gemini-pro
    temperature: 0.1
    max_tokens: 512

source:
  arxiv:
    category: ["cs.AI","cs.CV","cs.LG","cs.CL"]

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv']